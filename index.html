<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monsterpatch Squad Builder</title>
    <style>
        @font-face {
            font-family: 'MyConsolas';
            src: url('https://cdn.jsdelivr.net/gh/monsterpatchwiki-spec/font@main/consolas.ttf') format('truetype');
        }
        :root {
            --red: #d15c62; --blue: #4b689f; --purple: #874185; --pink: #DE9996;
            --black: #342420; --white: #eadfc1; --yellow: #d8bc6a;
        }
        body { 
            background-color: var(--black); font-family: 'MyConsolas', monospace; 
            font-weight: bold; padding: 20px; margin: 0; 
            display: flex; justify-content: center; color: var(--black);
        }

        .page-wrapper { width: 100%; max-width: 1450px; }
        .slot-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 40px; max-width: 1020px; margin-left: auto; margin-right: auto; }

        .slot { border: 4px solid var(--black); padding: 22px; background-color: var(--white); border-radius: 12px; position: relative; margin-top: 17px; }
        .segment-title { position: absolute; top: -13px; left: 11px; padding: 2px 9px; border: 2px solid var(--black); font-weight: bold; border-radius: 4px; font-size: 12px; color: var(--black); }
        .tab-slot { background: var(--yellow); top: -17px; left: 17px; font-size: 18px; }
        .tab-moveset { background: var(--blue); color: #eadfc1; border: 2px solid var(--blue); }
        .tab-passives { background: var(--purple); color: #eadfc1; border: 2px solid var(--purple); }
        .tab-stats { background: var(--red); color: #eadfc1; border: 2px solid var(--red); }
        
        .section-box { border: 3px solid var(--blue); padding: 17px 11px 11px 11px; margin-bottom: 17px; position: relative; margin-top: 17px; }
        .passives-box { border: 3px solid var(--purple); }
        .sprite-section { display: flex; gap: 11px; margin-bottom: 10px; }
        .sprite-box { border: 3px solid var(--black); width: 100%; height: 154px; background: var(--white); }
        .stats-panel { border: 3px solid var(--red); padding: 17px 11px 11px 11px; position: relative; margin-top: 17px; }
        
        .stat-row { display: flex; align-items: center; gap: 5px; }
        .stat-bar { height: 10px; background: var(--white); border: 1px solid var(--black); flex-grow: 1; position: relative; overflow: hidden; }
        .stat-bar-fill { height: 100%; width: var(--fill, 0%); background: var(--red); transition: width 0.2s ease; }
        
        input, select { background: var(--white); border: 1px solid var(--black); color: var(--black); padding: 8px; font-family: 'MyConsolas', monospace; font-weight: bold; font-size: 14px; box-sizing: border-box; width: 100%; }
        
        .sparkle-checkbox { appearance: none; -webkit-appearance: none; background: var(--white) !important; border: 2px solid var(--black); width: 20px !important; height: 20px !important; cursor: pointer; }
        .sparkle-checkbox:checked { background: var(--yellow) !important; }

        .top-header { display: flex; justify-content: space-between; align-items: flex-end; color: var(--white); margin-bottom: 20px; border-bottom: 2px solid var(--white); padding-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .top-header-buttons { display: flex; gap: 10px; }
        .btn { background: var(--pink); border: 2px solid var(--black); color: var(--black); padding: 8px 16px; font-weight: bold; cursor: pointer; font-family: 'MyConsolas', monospace; }

        /* --- Damage Calculation Zone --- */
        .damage-calc-zone {
            border: 4px solid var(--black);
            border-radius: 12px;
            background-color: var(--white);
            padding: 26px 22px 22px 22px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            color: var(--black);
        }
        .tab-damage {
            background: var(--red);
            color: white;
            border: 2px solid var(--red);
            top: -17px;
            left: 17px;
        }
        .dmg-columns { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
        .dmg-col { flex: 1; min-width: 220px; display: flex; flex-direction: column; gap: 8px; }
        .dmg-col label { font-size: 12px; letter-spacing: 0.5px; }
        .dmg-result-box { border: 2px solid var(--black); background: rgba(0,0,0,0.05); padding: 12px; min-height: 60px; }
        .dmg-result-value { font-size: 26px; }

        @media (max-width: 500px) {
            .slot-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="top-header">
        <div><h1>MONSTERPATCH SQUAD BUILDER</h1><p>ALPHA v0.182</p></div>
        <div class="top-header-buttons">
            <button class="btn" onclick="importSquad()">IMPORT SQUAD</button>
            <button class="btn" onclick="exportSquad()">EXPORT SQUAD</button>
        </div>
    </div>
    
    <div class="slot-grid" id="slot-area"></div>

    <div class="damage-calc-zone" id="damage-calc-zone">
        <div class="segment-title tab-damage">DAMAGE CALCULATION ZONE</div>
        <!-- contents injected by createDamageCalcZone() in calcbrain.js -->
    </div>
</div>

<script src="calcbrain.js"></script>

</body>
</html>
